<div id="checkout" class="halaman">
     <div class="kartu">
         <h3>Proses Checkout Barang</h3>
         <p class="petunjuk">Cukup tempel link produk Shopee di bawah ini (bisa link pendek atau panjang)</p>
         <div class="kolom-input">
             <input type="text" placeholder="Contoh: https://shopee.co.id/product/1234567890/..." class="input-data" id="link-produk">
         </div>
         <div class="baris-dua">
             <div class="kolom-input kecil">
                 <label>Jumlah Beli</label>
                 <input type="number" value="1" min="1" class="input-data" id="jumlah-beli">
             </div>
             <div class="kolom-input kecil">
                 <label>ID Varian (jika ada)</label>
                 <input type="text" placeholder="987654" class="input-data" id="id-varian">
             </div>
         </div>
         <div class="kolom-input">
             <input type="text" placeholder="Kode Voucher (opsional)" class="input-data" id="kode-voucher">
         </div>
         <button class="btn-tambah" id="btn-proses">🚀 Mulai Proses Checkout</button>
         <p class="catatan">Pastikan token/cookies sudah tersimpan dan saldo cukup di akun Shopee</p>
     </div>
 </div>
